name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_name: feishu-cursor-bridge-windows
          - os: macos-latest
            platform: mac
            artifact_name: feishu-cursor-bridge-macos
          - os: ubuntu-latest
            platform: linux
            artifact_name: feishu-cursor-bridge-linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install lite dependencies
        run: npm ci
        working-directory: lite

      - name: Build lite
        run: npm run build
        working-directory: lite

      - name: Build app
        run: npm run build

      - name: Package - Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Package - macOS
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never

      - name: Package - Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/feishu-cursor-bridge-setup-*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/latest.yml
            release/latest-mac.yml
            release/latest-linux.yml
            release/*.blockmap
          if-no-files-found: warn
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display downloaded files
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          # 顺序上传，避免多资产并行覆盖同名资源时 GitHub API 404（update-release-asset）
          preserve_order: true
          overwrite_files: true
          # 勿用 **/*.yml，会带上 builder-debug.yml 等且可能与 latest.yml 争用同名资产
          files: |
            artifacts/**/feishu-cursor-bridge-setup-*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/latest.yml
            artifacts/**/latest-mac.yml
            artifacts/**/latest-linux.yml
            artifacts/**/*.blockmap

      - name: Update Homebrew Tap
        if: success()
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating Homebrew cask to version $VERSION"

          # 使用本 job 已下载的 macOS artifact 本地算 SHA256，避免 Releases API 无 digest / jq 对空 assets 报错
          INTEL_DMG="$(find artifacts -type f -name '*.dmg' ! -name '*arm64*' | head -n 1)"
          ARM_DMG="$(find artifacts -type f -name '*.dmg' -name '*arm64*' | head -n 1)"

          if [ -z "$INTEL_DMG" ] || [ ! -f "$INTEL_DMG" ]; then
            echo "::warning::Intel .dmg not found under artifacts/, skipping Homebrew update"
            exit 0
          fi
          if [ -z "$ARM_DMG" ] || [ ! -f "$ARM_DMG" ]; then
            echo "::warning::ARM64 .dmg not found under artifacts/, skipping Homebrew update"
            exit 0
          fi

          INTEL_SHA="$(sha256sum "$INTEL_DMG" | cut -d' ' -f1)"
          ARM_SHA="$(sha256sum "$ARM_DMG" | cut -d' ' -f1)"

          echo "Intel dmg: $INTEL_DMG"
          echo "ARM64 dmg: $ARM_DMG"
          echo "Intel SHA256: $INTEL_SHA"
          echo "ARM64 SHA256: $ARM_SHA"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/lk-eternal/homebrew-tap.git" homebrew-tap
          cd homebrew-tap

          awk -v ver="$VERSION" -v intel_sha="$INTEL_SHA" -v arm_sha="$ARM_SHA" '
            /^  version / { $0 = "  version \"" ver "\"" }
            /on_intel do/ { intel = 1 }
            /on_arm do/ { arm = 1; intel = 0 }
            intel && /sha256/ { $0 = "    sha256 \"" intel_sha "\""; intel = 0 }
            arm && /sha256/ { $0 = "    sha256 \"" arm_sha "\""; arm = 0 }
            { print }
          ' Casks/feishu-cursor-bridge.rb > tmp.rb && mv tmp.rb Casks/feishu-cursor-bridge.rb

          cat Casks/feishu-cursor-bridge.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/feishu-cursor-bridge.rb
          git diff --cached --quiet || (git commit -m "feat: bump feishu-cursor-bridge to $VERSION" && git push)
