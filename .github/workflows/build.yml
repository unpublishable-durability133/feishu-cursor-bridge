name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_name: feishu-cursor-bridge-windows
          - os: macos-latest
            platform: mac
            artifact_name: feishu-cursor-bridge-macos
          - os: ubuntu-latest
            platform: linux
            artifact_name: feishu-cursor-bridge-linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install lite dependencies
        run: npm ci
        working-directory: lite

      - name: Build lite
        run: npm run build
        working-directory: lite

      - name: Build app
        run: npm run build

      - name: Package - Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Package - macOS
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never

      - name: Package - Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*Setup*.exe
            release/feishu-cursor-bridge-setup-*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap
          if-no-files-found: warn
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display downloaded files
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*Setup*.exe
            artifacts/**/feishu-cursor-bridge-setup-*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.yml
            artifacts/**/*.blockmap

      - name: Update Homebrew Tap
        if: success()
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating Homebrew cask to version $VERSION"

          RELEASE_JSON=$(curl -sH "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$GITHUB_REF_NAME")

          INTEL_SHA=$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | endswith(".dmg")) | select(.name | contains("arm64") | not)][0].digest' | sed 's/sha256://')
          ARM_SHA=$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | endswith("-arm64.dmg"))][0].digest' | sed 's/sha256://')

          echo "Intel SHA256: $INTEL_SHA"
          echo "ARM64 SHA256: $ARM_SHA"

          if [ "$INTEL_SHA" = "null" ] || [ "$ARM_SHA" = "null" ] || [ -z "$INTEL_SHA" ] || [ -z "$ARM_SHA" ]; then
            echo "::warning::Could not extract SHA256 from release assets, skipping Homebrew update"
            exit 0
          fi

          git clone "https://x-access-token:${GH_TOKEN}@github.com/lk-eternal/homebrew-tap.git" homebrew-tap
          cd homebrew-tap

          awk -v ver="$VERSION" -v intel_sha="$INTEL_SHA" -v arm_sha="$ARM_SHA" '
            /^  version / { $0 = "  version \"" ver "\"" }
            /on_intel do/ { intel = 1 }
            /on_arm do/ { arm = 1; intel = 0 }
            intel && /sha256/ { $0 = "    sha256 \"" intel_sha "\""; intel = 0 }
            arm && /sha256/ { $0 = "    sha256 \"" arm_sha "\""; arm = 0 }
            { print }
          ' Casks/feishu-cursor-bridge.rb > tmp.rb && mv tmp.rb Casks/feishu-cursor-bridge.rb

          cat Casks/feishu-cursor-bridge.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/feishu-cursor-bridge.rb
          git diff --cached --quiet || (git commit -m "feat: bump feishu-cursor-bridge to $VERSION" && git push)
